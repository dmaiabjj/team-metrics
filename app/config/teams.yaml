# area_paths = EXCLUSIONS: items under these paths are excluded from reports.
# Empty = include all items in the project.
teams:
  game-services:
    project: "game-services"
    azure_team: "game-services Team"
    area_paths: []  # add paths to exclude
    deliverable_types:
      - "User Story"
    container_types:
      - "Epic"
      - "Feature"
    bug_types:
      - "Bug"
    states:
      - canonical_status: "Under Development"
        real_states:
          - "Active"
          - "Onhold"
          - "Blocked"
          - "Code Review"
      - canonical_status: "Under QA"
        real_states:
          - "Ready for QA"
          - "In QA"
          - "QA bug pending"
      - canonical_status: "Delivered"
        real_states:
