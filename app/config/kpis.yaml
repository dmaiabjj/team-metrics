kpis:
  rework_rate:
    enabled: true
    description: "Percentage of items that require rework after reaching QA"
    formula: "items_with_rework / items_reached_qa"
    rag:
      green_max: 0.10
      amber_max: 0.15
    rework_tags:
      - "Code Defect"
      - "Scope / Requirements"
    qa_canonical_status: "Under QA"

  delivery_predictability:
    enabled: true
    description: "Ratio of items deployed vs items committed to the period"
    formula: "items_deployed / items_committed"
    rag:
      green_min: 0.85
      amber_min: 0.70
    delivered_canonical_status: "Delivered"

  flow_hygiene:
    enabled: true
    description: "Ratio of items queuing in wait states against per-state WIP limits"
    formula: "max(avg_items_in_state / wip_limit_for_state) across all queue states"
    queue_states:
      - "Active"
      - "Onhold"
      - "Blocked"
      - "Code Review"
      - "Ready for QA"
      - "In QA"
      - "QA bug pending"
    default_wip_limits:
      "Active": 10
      "Onhold": 3
      "Blocked": 3
      "Code Review": 3
      "Ready for QA": 3
      "In QA": 3
      "QA bug pending": 3
    rag:
      green_max: 1.0
      amber_max: 1.2

  wip_discipline:
    enabled: true
    description: "Percentage of developers/QAs staying within personal WIP limits"
    formula: "compliant_hours / total_hours"
    dev_wip_limit: 3
    qa_wip_limit: 3
    compliance_threshold: 0.80
    rag:
      green_min: 0.80
      amber_min: 0.60

  tech_debt_ratio:
    enabled: true
    description: "Proportion of delivered items that are tech debt"
    formula: "tech_debt_deployed / total_deployed"
    delivered_canonical_status: "Delivered"
    rag:
      amber_min: 0.10
      green_min: 0.20
      green_max: 0.30

  initiative_delivery:
    enabled: true
    description: "Percentage of initiatives (Epics/Features) committed that were delivered"
    formula: "initiatives_delivered / initiatives_committed"
    delivered_canonical_status: "Delivered"
    rag:
      green_min: 0.85
      amber_min: 0.70

  reliability_action_delivery:
    enabled: true
    description: "Percentage of reliability actions (post-mortem deliverables) delivered within SLA"
    formula: "reliability_actions_sla_met / reliability_actions_delivered"
    delivered_canonical_status: "Delivered"
    rag:
      green_min: 0.85
      amber_min: 0.70

  teams:
    game-services:
      tech_debt_epic_ids: []
      post_mortem_epic_ids: []
      post_mortem_sla_weeks: 8
      wip_limits: {}
      initiative_ids: []
    domain-tooling-services:
      tech_debt_epic_ids: []
      post_mortem_epic_ids: []
      post_mortem_sla_weeks: 8
      wip_limits: {}
      initiative_ids: []
    payment-services:
      tech_debt_epic_ids: []
      post_mortem_epic_ids: []
      post_mortem_sla_weeks: 8
      wip_limits: {}
      initiative_ids: []
    player-engagement-services:
      tech_debt_epic_ids: []
      post_mortem_epic_ids: []
      post_mortem_sla_weeks: 8
      wip_limits: {}
      initiative_ids: []
    rules-engine:
      tech_debt_epic_ids: []
      post_mortem_epic_ids: []
      post_mortem_sla_weeks: 8
      wip_limits: {}
      initiative_ids: []
