kpis:
  rework_rate:
    enabled: true
    description: "Percentage of items that require rework after reaching QA"
    formula: "items_with_rework / items_reached_qa"
    rag:
      green_max: 0.10
      amber_max: 0.15
    rework_tags:
      - "Code Defect"
      - "Scope / Requirements"
    qa_canonical_status: "QA Active"

  delivery_predictability:
    enabled: true
    description: "Ratio of items deployed vs items committed to the period"
    formula: "items_deployed / items_committed"
    rag:
      green_min: 0.85
      amber_min: 0.70
    delivered_canonical_status: "Delivered"
